<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Calculator</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      background-color: #f4f4f4;
      font-family: Arial, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }
    .calculator {
      background-color: #fff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
      width: 320px;
    }
    .display {
      background-color: #222;
      color: #fff;
      font-size: 2rem;
      text-align: right;
      padding: 15px;
      border-radius: 8px;
      margin-bottom: 20px;
      height: 60px;
      overflow: hidden;
    }
    .buttons {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 15px;
    }
    .buttons button {
      font-size: 1.2rem;
      padding: 20px;
      border: none;
      border-radius: 8px;
      background-color: #e0e0e0;
      cursor: pointer;
      transition: background 0.2s ease;
    }
    .buttons button:hover {
      background-color: #d6d6d6;
    }
    .buttons button.active,
    .buttons button:active {
      background-color: #ccc;
    }
    .operator {
      background-color: #f9a825;
      color: white;
    }
    .operator:hover {
      background-color: #f57f17;
    }
    .equal {
      background-color: #4caf50;
      color: white;
    }
    .equal:hover {
      background-color: #388e3c;
    }
    .clear {
      background-color: #ef5350;
      color: white;
    }
    .clear:hover {
      background-color: #c62828;
    }
  </style>
</head>
<body>

  <div class="calculator">
    <div class="display" id="display">0</div>
    <div class="buttons">
      <button class="clear" onclick="clearDisplay()" data-key="c">C</button>
      <button onclick="appendValue('(')" data-key="(">(</button>
      <button onclick="appendValue(')')" data-key=")">)</button>
      <button class="operator" onclick="appendValue('/')" data-key="/">÷</button>

      <button onclick="appendValue('7')" data-key="7">7</button>
      <button onclick="appendValue('8')" data-key="8">8</button>
      <button onclick="appendValue('9')" data-key="9">9</button>
      <button class="operator" onclick="appendValue('*')" data-key="*">×</button>

      <button onclick="appendValue('4')" data-key="4">4</button>
      <button onclick="appendValue('5')" data-key="5">5</button>
      <button onclick="appendValue('6')" data-key="6">6</button>
      <button class="operator" onclick="appendValue('-')" data-key="-">−</button>

      <button onclick="appendValue('1')" data-key="1">1</button>
      <button onclick="appendValue('2')" data-key="2">2</button>
      <button onclick="appendValue('3')" data-key="3">3</button>
      <button class="operator" onclick="appendValue('+')" data-key="+">+</button>

      <button onclick="appendValue('0')" data-key="0">0</button>
      <button onclick="appendValue('.')" data-key=".">.</button>
      <button onclick="backspace()" data-key="Backspace">&larr;</button>
      <button class="equal" onclick="calculateResult()" data-key="=">=</button>
    </div>
  </div>

  <script>
    const display = document.getElementById('display');

    function appendValue(value) {
      if (display.innerText === '0') {
        display.innerText = value;
      } else {
        display.innerText += value;
      }
    }

    function clearDisplay() {
      display.innerText = '0';
    }

    function backspace() {
      if (display.innerText.length > 1) {
        display.innerText = display.innerText.slice(0, -1);
      } else {
        display.innerText = '0';
      }
    }

    function calculateResult() {
      try {
        display.innerText = eval(display.innerText);
      } catch (e) {
        display.innerText = 'Error';
      }
    }

    document.addEventListener('keydown', (event) => {
      const key = event.key;
      let button;
      if (key === 'Backspace') {
        button = document.querySelector(`button[data-key="Backspace"]`);
      } else {
        button = document.querySelector(`button[data-key="${key.toLowerCase()}"]`);
      }

      if (button) {
        button.classList.add('active');
        setTimeout(() => {
          button.classList.remove('active');
        }, 100);
      }

      if (key >= '0' && key <= '9' || key === '.') {
        appendValue(key);
      } else if (key === '+' || key === '-') {
        appendValue(key);
      } else if (key === '*') {
        appendValue('*');
      } else if (key === '/') {
        appendValue('/');
      } else if (key === 'Enter' || key === '=') {
        calculateResult();
      } else if (key === 'Backspace') {
        backspace();
      } else if (key === 'Escape' || key.toLowerCase() === 'c') {
        clearDisplay();
      } else if (key === '(' || key === ')') {
        appendValue(key);
      }
    });
  </script>

</body>
</html>
